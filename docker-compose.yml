networks:
  # supabase-net must exist before starting this stack.
  # Created by the localai/Supabase stack: docker network create supabase-net
  supabase-net:
    external: true

volumes:
  media_data:

services:
  redis:
    image: redis:7-alpine
    container_name: app_redis
    restart: unless-stopped

  worker:
    build:
      context: ./django-app
      dockerfile: backend.Dockerfile
    container_name: app_worker
    entrypoint: ["./worker.entrypoint.sh"]
    command: python manage.py rqworker default
    env_file: ./.env
    restart: unless-stopped
    volumes:
      # PROJ-25: parse_bulk_upload_job reads uploads from MEDIA_ROOT/bulk_uploads/.
      - media_data:/app/media
    networks:
      - default
      - supabase-net
    depends_on:
      - redis

  worker-scraper:
    # PROJ-25 AC-27: replicas controlled by BACKEND_SCRAPER_WORKERS (default 5).
    # container_name removed — would conflict with replicated containers.
    build:
      context: ./django-app
      dockerfile: backend.Dockerfile
    entrypoint: ["./worker.entrypoint.sh"]
    command: python manage.py rqworker scraper
    env_file: ./.env
    restart: unless-stopped
    volumes:
      # PROJ-23: amazon_html_snapshot writes HTML to MEDIA_ROOT/snapshots/.
      - media_data:/app/media
    networks:
      - default
      - supabase-net
    depends_on:
      - redis
    deploy:
      replicas: ${BACKEND_SCRAPER_WORKERS:-5}

  worker-research:
    build:
      context: ./django-app
      dockerfile: backend.Dockerfile
    container_name: app_worker_research
    entrypoint: ["./worker.entrypoint.sh"]
    command: python manage.py rqworker research
    env_file: ./.env
    restart: unless-stopped
    networks:
      - default
      - supabase-net
    depends_on:
      - redis

  worker-slogan:
    build:
      context: ./django-app
      dockerfile: backend.Dockerfile
    container_name: app_worker_slogan
    entrypoint: ["./worker.entrypoint.sh"]
    command: python manage.py rqworker slogan
    env_file: ./.env
    restart: unless-stopped
    networks:
      - default
      - supabase-net
    depends_on:
      - redis

  worker-design:
    build:
      context: ./django-app
      dockerfile: backend.Dockerfile
    container_name: app_worker_design
    entrypoint: ["./worker.entrypoint.sh"]
    command: python manage.py rqworker design
    env_file: ./.env
    restart: unless-stopped
    networks:
      - default
      - supabase-net
    depends_on:
      - redis

  worker-agent:
    build:
      context: ./django-app
      dockerfile: backend.Dockerfile
    container_name: app_worker_agent
    entrypoint: ["./worker.entrypoint.sh"]
    command: python manage.py rqworker agent
    env_file: ./.env
    restart: unless-stopped
    networks:
      - default
      - supabase-net
    depends_on:
      - redis

  worker-search:
    build:
      context: ./django-app
      dockerfile: backend.Dockerfile
    container_name: app_worker_search
    entrypoint: ["./worker.entrypoint.sh"]
    command: python manage.py rqworker search
    env_file: ./.env
    restart: unless-stopped
    networks:
      - default
      - supabase-net
    depends_on:
      - redis

  scheduler:
    build:
      context: ./django-app
      dockerfile: backend.Dockerfile
    container_name: app_scheduler
    entrypoint: ["./worker.entrypoint.sh"]
    command: python manage.py rqscheduler
    env_file: ./.env
    restart: unless-stopped
    networks:
      - default
      - supabase-net
    depends_on:
      - redis

  web:
    build:
      context: ./django-app
      dockerfile: backend.Dockerfile
    container_name: app_backend
    command: python manage.py runserver 0.0.0.0:8000
    env_file: ./.env
    volumes:
      - media_data:/app/media
    networks:
      - default
      - supabase-net
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend-ui
      dockerfile: Dockerfile
      target: dev
    container_name: app_frontend
    env_file: ./.env
    depends_on:
      - web

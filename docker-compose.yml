networks:
  # supabase-net must exist before starting this stack.
  # Created by the localai/Supabase stack: docker network create supabase-net
  supabase-net:
    external: true

volumes:
  media_data:

services:
  redis:
    image: redis:7-alpine
    container_name: app_redis
    restart: unless-stopped

  worker:
    build:
      context: ./django-app
      dockerfile: backend.Dockerfile
    container_name: app_worker
    entrypoint: ["./worker.entrypoint.sh"]
    command: python manage.py rqworker default
    env_file: ./.env
    restart: unless-stopped
    networks:
      - default
      - supabase-net
    depends_on:
      - redis

  worker-scraper:
    build:
      context: ./django-app
      dockerfile: backend.Dockerfile
    container_name: app_worker_scraper
    entrypoint: ["./worker.entrypoint.sh"]
    command: python manage.py rqworker scraper
    env_file: ./.env
    restart: unless-stopped
    networks:
      - default
      - supabase-net
    depends_on:
      - redis

  web:
    build:
      context: ./django-app
      dockerfile: backend.Dockerfile
    container_name: app_backend
    command: python manage.py runserver 0.0.0.0:8000
    env_file: ./.env
    volumes:
      - media_data:/app/media
    networks:
      - default
      - supabase-net
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend-ui
      dockerfile: Dockerfile
      target: dev
    container_name: app_frontend
    env_file: ./.env
    depends_on:
      - web

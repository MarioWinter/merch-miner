name: Deploy

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          command_timeout: 5m
          script: |
            set -e
            DC="docker compose -f docker-compose.yml -f docker-compose.prod.yml"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd /home/dev/merch-miner
            git fetch origin main && git reset --hard origin/main
            $DC pull
            # 1. Start web + redis + frontend + caddy (entrypoint runs migrate, collectstatic, loaddata, setup_scheduler)
            $DC up -d web redis frontend caddy
            # 2. Wait for web to be ready (gunicorn responding)
            echo "Waiting for web..."
            until $DC exec -T web python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/admin/login/')" 2>/dev/null; do sleep 3; done
            echo "Web ready."
            # 3. Start workers
            $DC up -d --remove-orphans
            echo "Deployed $(date)"
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USER }}

name: CI

on:
  pull_request:
    branches: [main]
  # Also run on push to main so docker-publish can be gated on CI success
  # (without this, a direct merge would skip tests entirely).
  push:
    branches: [main]

# Opt actions/* (Node 20) into Node 24 ahead of the Sept 2026 enforced cutover.
# Same effect as upgrading actions/checkout v4→v5 etc., but no version-bump risk.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r django-app/requirements.txt ruff

      - name: Check pending migrations
        working-directory: django-app
        run: python manage.py makemigrations --check --dry-run
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DB_NAME: test_db
          DB_USER: test
          DB_PASSWORD: test
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_LOCATION: redis://localhost:6379/1
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_DB: 0

      - name: Run pytest
        working-directory: django-app
        run: pytest --tb=short
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DB_NAME: test_db
          DB_USER: test
          DB_PASSWORD: test
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_LOCATION: redis://localhost:6379/1
          # RQ_QUEUES reads REDIS_HOST/PORT/DB independently of REDIS_LOCATION;
          # without these, post_save signal handlers (e.g. vector_app.signals)
          # try to enqueue against hostname "redis" and fail with DNS errors.
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_DB: 0
          # Dummy LLM key so services that pre-validate the env var don't raise
          # before HTTP-level mocks take effect (e.g. mode_classifier tests).
          # All real network calls in tests are mocked.
          OPENROUTER_API_KEY: sk-test-dummy-key-for-ci-only

      - name: Lint (ruff)
        run: ruff check django-app/

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-ui/package-lock.json

      - name: Install
        working-directory: frontend-ui
        run: npm ci

      - name: Lint
        working-directory: frontend-ui
        run: npm run lint

      - name: Test
        working-directory: frontend-ui
        run: npm run test:ci

      - name: Build
        working-directory: frontend-ui
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

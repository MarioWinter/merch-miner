name: Security Scan

on:
  schedule:
    - cron: '0 9 * * 1'
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bandit:
    name: Python SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Pin bandit version for reproducibility — bumping is intentional, not implicit.
      - run: pip install 'bandit==1.8.0'

      - name: Run bandit
        # Config in django-app/bandit.yaml: excludes env/.venv/tests, skips B110
        # (try/except/pass — accepted fail-soft pattern for telemetry/cleanup).
        # Severity LOW catches everything that's not pre-suppressed.
        run: bandit -r django-app/ -c django-app/bandit.yaml --severity-level low

  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        working-directory: frontend-ui
        run: npm ci

      - name: Audit
        working-directory: frontend-ui
        run: npm audit --audit-level=high

  trivy:
    name: Container Scan (trivy)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/${{ secrets.GHCR_USER }}/merch-miner/backend:latest
          format: table
          severity: HIGH,CRITICAL
          exit-code: '1'
          # ignore-unfixed: skip findings where upstream (e.g. Debian) hasn't
          # released a patch yet. They're also flagged as 'fix_deferred' or
          # 'will_not_fix' — there's nothing we can do but wait. As soon as a
          # Fixed Version appears, Trivy will surface them again.
          ignore-unfixed: true
          # `.trivyignore` at repo root holds justified non-exploitable findings
          # that DO have an upstream fix but we keep deliberately suppressed.
          trivyignores: ./.trivyignore

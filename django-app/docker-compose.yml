services:
    db:
        image: postgres:latest
        container_name: app_database
        environment:
            POSTGRES_DB: ${DB_NAME}
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:latest
        container_name: app_redis
        volumes:
            - redis_data:/data

    web:
        build:
            context: .
            dockerfile: backend.Dockerfile
        env_file: .env
        container_name: app_backend

        volumes:
            - .:/app
            #- app_media:/app/media
            #- app_static:/app/static
        ports:
            - "127.0.0.1:8000:8000"
        depends_on:
            - db
            - redis

volumes:
    postgres_data:
    redis_data:
    #app_media:
    #app_static:

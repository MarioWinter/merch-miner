services:
  web:
    image: ${BACKEND_IMAGE}
    container_name: app_backend
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    restart: unless-stopped
    networks:
      - default
      - merch_net
      - supabase-net

  worker:
    image: ${BACKEND_IMAGE}
    env_file: ./.env
    restart: unless-stopped
    networks:
      - default
      - supabase-net

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: app_frontend
    restart: unless-stopped
    networks:
      - default
      - merch_net

  caddy:
    image: caddy:2-alpine
    container_name: app_caddy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - static_volume:/srv/static:ro
      - media_volume:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - web
      - frontend
    networks:
      - default
      - merch_net

volumes:
  static_volume:
  media_volume:
  caddy_data:
  caddy_config:

networks:
  default: {}
  merch_net:
    external: true
    name: merch_net
  supabase-net:
    external: true

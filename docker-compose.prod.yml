services:
  web:
    image: ghcr.io/mariowinter/merch-miner/backend:latest
    env_file: ./.env
    container_name: app_backend
    environment:
      DJANGO_ENV: production
    # PROJ-29 AC-Ops-Gunicorn-1/2/3 — gthread worker class is required so a
    # single long-running SSE stream cannot occupy a whole worker process; the
    # 90s timeout covers worst-case niche-agent turns (8-tool * 30s budget is
    # bounded by recursion_limit=10 + per-tool 30s cap but typical turns finish
    # well under 90s). --max-requests recycling prevents long-tail memory
    # growth from accumulated LangGraph state across thousands of requests.
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 8 --worker-class gthread --timeout 90 --graceful-timeout 30 --max-requests 1000 --max-requests-jitter 100
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    restart: unless-stopped
    networks:
      - default
      - merch_net
      - supabase-net

  worker:
    image: ghcr.io/mariowinter/merch-miner/backend:latest
    env_file: ./.env
    # PROJ-29 AC-Ops-RQ-1 — recycle workers after 500 jobs to bound memory
    # growth from LangGraph state + embedding clients. Result/failure TTLs
    # are set per-queue in settings.RQ_QUEUES.
    command: python manage.py rqworker default --max-jobs 500
    restart: unless-stopped
    volumes:
      # PROJ-25: parse_bulk_upload_job reads uploads from MEDIA_ROOT/bulk_uploads/.
      - media_volume:/app/media
    networks:
      - default
      - supabase-net

  worker-scraper:
    # PROJ-25 AC-27: replicas controlled by BACKEND_SCRAPER_WORKERS (default 5).
    # No container_name — would conflict with replicated containers.
    image: ghcr.io/mariowinter/merch-miner/backend:latest
    command: python manage.py rqworker scraper
    env_file: ./.env
    restart: unless-stopped
    volumes:
      # PROJ-23: amazon_html_snapshot writes HTML to MEDIA_ROOT/snapshots/.
      - media_volume:/app/media
    networks:
      - default
      - supabase-net
    deploy:
      replicas: ${BACKEND_SCRAPER_WORKERS:-5}

  worker-research:
    image: ghcr.io/mariowinter/merch-miner/backend:latest
    env_file: ./.env
    restart: unless-stopped
    networks:
      - default
      - supabase-net

  worker-slogan:
    image: ghcr.io/mariowinter/merch-miner/backend:latest
    env_file: ./.env
    restart: unless-stopped
    networks:
      - default
      - supabase-net

  worker-design:
    image: ghcr.io/mariowinter/merch-miner/backend:latest
    env_file: ./.env
    # design queue tasks (BG-Remove, Upscale, Generate) write to FileFields
    # backed by MEDIA_ROOT — needs RW access to the same volume as web.
    volumes:
      - media_volume:/app/media
    restart: unless-stopped
    networks:
      - default
      - supabase-net

  worker-agent:
    image: ghcr.io/mariowinter/merch-miner/backend:latest
    env_file: ./.env
    # PROJ-29 AC-Ops-RQ-4 — agent queue carries chat-domain jobs
    # (summarize_conversation, follow-up async helpers); recycle after 500
    # jobs. Result/failure TTLs set in settings.RQ_QUEUES['agent'].
    command: python manage.py rqworker agent --max-jobs 500
    restart: unless-stopped
    networks:
      - default
      - supabase-net

  worker-search:
    image: ghcr.io/mariowinter/merch-miner/backend:latest
    env_file: ./.env
    restart: unless-stopped
    networks:
      - default
      - supabase-net

  scheduler:
    image: ghcr.io/mariowinter/merch-miner/backend:latest
    entrypoint: ["./worker.entrypoint.sh"]
    # PROJ-25 follow-up: --interval 10 (default 60) so the bulk-scrape drainer's
    # self-rescheduled ticks fire every ~10s as designed (DRAINER_TICK_SECONDS).
    # Negligible CPU impact, ~6× more responsive throughput on the scraper queue.
    command: python manage.py rqscheduler --interval 10
    env_file: ./.env
    restart: unless-stopped
    networks:
      - default
      - supabase-net

  frontend:
    image: ghcr.io/mariowinter/merch-miner/frontend:latest
    container_name: app_frontend
    restart: unless-stopped
    networks:
      - default
      - merch_net

  caddy:
    image: caddy:2-alpine
    container_name: app_caddy
    volumes:
      # Directory-mount (NOT single-file) so editor "rename and replace" saves
      # on the host don't strand the container on a now-orphan inode. A file-
      # level bind-mount follows the original inode; vim/VSCode-remote etc.
      # save by creating a new file and renaming over the old — that breaks
      # the mount silently. See memory: feedback_caddy_bind_mount_gotcha.
      - ./caddy:/etc/caddy:ro
      - static_volume:/srv/static:ro
      - media_volume:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - web
      - frontend
    networks:
      - default
      - merch_net

volumes:
  static_volume:
  media_volume:
  caddy_data:
  caddy_config:

networks:
  default: {}
  merch_net:
    external: true
    name: merch_net
  supabase-net:
    external: true

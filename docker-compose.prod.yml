services:
  web:
    container_name: app_backend
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    restart: unless-stopped
    networks:
      - default
      - merch_net

  frontend:
    build:
      context: ./frontend-ui
      dockerfile: Dockerfile
      target: prod
    container_name: app_frontend
    restart: unless-stopped
    networks:
      - default
      - merch_net

  caddy:
    image: caddy:2-alpine
    container_name: app_caddy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - static_volume:/srv/static:ro
      - media_volume:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - web
      - frontend
    networks:
      - default
      - merch_net

volumes:
  postgres_data:
  static_volume:
  media_volume:
  caddy_data:
  caddy_config:

networks:
  default: {}
  merch_net:
    external: true
    name: merch_net

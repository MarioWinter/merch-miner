services:
  web:
    image: ghcr.io/mariowinter/merch-miner/backend:latest
    env_file: ./.env
    container_name: app_backend
    environment:
      DJANGO_ENV: production
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    restart: unless-stopped
    networks:
      - default
      - merch_net
      - supabase-net

  worker:
    image: ghcr.io/mariowinter/merch-miner/backend:latest
    env_file: ./.env
    restart: unless-stopped
    volumes:
      # PROJ-25: parse_bulk_upload_job reads uploads from MEDIA_ROOT/bulk_uploads/.
      - media_volume:/app/media
    networks:
      - default
      - supabase-net

  worker-scraper:
    # PROJ-25 AC-27: replicas controlled by BACKEND_SCRAPER_WORKERS (default 5).
    # No container_name — would conflict with replicated containers.
    image: ghcr.io/mariowinter/merch-miner/backend:latest
    command: python manage.py rqworker scraper
    env_file: ./.env
    restart: unless-stopped
    volumes:
      # PROJ-23: amazon_html_snapshot writes HTML to MEDIA_ROOT/snapshots/.
      - media_volume:/app/media
    networks:
      - default
      - supabase-net
    deploy:
      replicas: ${BACKEND_SCRAPER_WORKERS:-5}

  worker-research:
    image: ghcr.io/mariowinter/merch-miner/backend:latest
    env_file: ./.env
    restart: unless-stopped
    networks:
      - default
      - supabase-net

  worker-slogan:
    image: ghcr.io/mariowinter/merch-miner/backend:latest
    env_file: ./.env
    restart: unless-stopped
    networks:
      - default
      - supabase-net

  worker-design:
    image: ghcr.io/mariowinter/merch-miner/backend:latest
    env_file: ./.env
    # design queue tasks (BG-Remove, Upscale, Generate) write to FileFields
    # backed by MEDIA_ROOT — needs RW access to the same volume as web.
    volumes:
      - media_volume:/app/media
    restart: unless-stopped
    networks:
      - default
      - supabase-net

  worker-agent:
    image: ghcr.io/mariowinter/merch-miner/backend:latest
    env_file: ./.env
    restart: unless-stopped
    networks:
      - default
      - supabase-net

  worker-search:
    image: ghcr.io/mariowinter/merch-miner/backend:latest
    env_file: ./.env
    restart: unless-stopped
    networks:
      - default
      - supabase-net

  scheduler:
    image: ghcr.io/mariowinter/merch-miner/backend:latest
    entrypoint: ["./worker.entrypoint.sh"]
    command: python manage.py rqscheduler
    env_file: ./.env
    restart: unless-stopped
    networks:
      - default
      - supabase-net

  frontend:
    image: ghcr.io/mariowinter/merch-miner/frontend:latest
    container_name: app_frontend
    restart: unless-stopped
    networks:
      - default
      - merch_net

  caddy:
    image: caddy:2-alpine
    container_name: app_caddy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - static_volume:/srv/static:ro
      - media_volume:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - web
      - frontend
    networks:
      - default
      - merch_net

volumes:
  static_volume:
  media_volume:
  caddy_data:
  caddy_config:

networks:
  default: {}
  merch_net:
    external: true
    name: merch_net
  supabase-net:
    external: true

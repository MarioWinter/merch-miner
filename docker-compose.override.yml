networks:
  supabase-net:
    external: false   # override base external:true → creates local network for dev

volumes:
  dev_pg_data:
  dev_redis_data:
  dev_node_modules:

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: app_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - dev_pg_data:/var/lib/postgresql/data
    networks:
      - supabase-net

  redis:
    volumes:
      - dev_redis_data:/data

  web:
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./django-app:/app
      - ./media:/app/media
      # FIX-dashboard Items 3 + 4 — dashboard widgets read the roadmap
      # MD + the CHANGELOG from the repo root. Bind-mount them OUTSIDE
      # /app because Docker Desktop on macOS can't nest single-file
      # mounts inside an existing dir mount.
      - ./docs/roadmap_user_facing.md:/srv/static_content/roadmap_user_facing.md:ro
      - ./CHANGELOG.md:/srv/static_content/CHANGELOG.md:ro
    depends_on:
      - db

  worker:
    volumes:
      - ./django-app:/app
      # PROJ-25: parser job reads MEDIA_ROOT/bulk_uploads/ — share host media dir.
      - ./media:/app/media
    depends_on:
      - db

  worker-scraper:
    volumes:
      - ./django-app:/app
      # PROJ-23: amazon_html_snapshot writes HTML to MEDIA_ROOT/snapshots/.
      - ./media:/app/media

  worker-research:
    volumes:
      - ./django-app:/app

  worker-slogan:
    volumes:
      - ./django-app:/app

  worker-design:
    volumes:
      - ./django-app:/app
      - ./media:/app/media

  worker-agent:
    volumes:
      - ./django-app:/app

  worker-search:
    volumes:
      - ./django-app:/app

  scheduler:
    volumes:
      - ./django-app:/app

  frontend:
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend-ui:/app
      - dev_node_modules:/app/node_modules
      # CHANGELOG.md lives at repo root and is read by vite.config.ts.
      # Mounted OUTSIDE /app to avoid macOS virtiofs nesting issues
      # (file-bind inside an existing dir-bind fails on Docker Desktop).
      - ./CHANGELOG.md:/changelog.md:ro
    environment:
      VITE_PROXY_TARGET: http://web:8000
      VITE_ONEDRIVE_CLIENT_ID: ${VITE_ONEDRIVE_CLIENT_ID:-}

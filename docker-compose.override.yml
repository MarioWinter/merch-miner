networks:
  supabase-net:
    external: false   # override base external:true → creates local network for dev

services:
  db:
    image: postgres:16
    container_name: app_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    networks:
      - supabase-net

  web:
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./django-app:/app
      - ./media:/app/media
    depends_on:
      - db

  worker:
    depends_on:
      - db

  frontend:
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend-ui:/app
      - /app/node_modules
    environment:
      VITE_PROXY_TARGET: http://web:8000

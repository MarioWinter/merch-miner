networks:
  supabase-net:
    external: false   # override base external:true → creates local network for dev

services:
  db:
    image: ${POSTGRES_IMAGE:?POSTGRES_IMAGE is required}
    container_name: app_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    networks:
      - supabase-net

  web:
    ports:
      - "${WEB_BIND_HOST:?WEB_BIND_HOST is required}:${WEB_HOST_PORT:?WEB_HOST_PORT is required}:${WEB_CONTAINER_PORT:?WEB_CONTAINER_PORT is required}"
    volumes:
      - ./django-app:/app
    depends_on:
      - db

  worker:
    depends_on:
      - db

  frontend:
    ports:
      - "${FRONTEND_BIND_HOST:?FRONTEND_BIND_HOST is required}:${FRONTEND_HOST_PORT:?FRONTEND_HOST_PORT is required}:${FRONTEND_CONTAINER_PORT:?FRONTEND_CONTAINER_PORT is required}"
    volumes:
      - ./frontend-ui:/app
      - /app/node_modules
    environment:
      VITE_PROXY_TARGET: http://web:8000
